<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Zolai (Tedim Chin / Zomi) trilingual dictionary — Zolai, English and Myanmar translations." />
  <title>Zolai Dictionary — Tedim · English · မြန်မာ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    /* Loading screen */
    .boot-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 80vh; gap: 1.25rem;
      text-align: center; padding: 2rem;
    }
    .boot-brand { font-family: var(--font-serif); font-size: 36px; color: var(--text); }
    .boot-brand em { color: var(--accent); font-style: italic; }
    .boot-status { font-size: 13px; color: var(--text-3); min-height: 20px; }
    .boot-bar-wrap {
      width: 220px; height: 4px; background: var(--border);
      border-radius: 4px; overflow: hidden;
    }
    .boot-bar {
      height: 100%; background: var(--accent);
      border-radius: 4px; width: 0%;
      transition: width 0.4s ease;
    }
    .boot-error {
      background: var(--danger-bg); border: 1px solid #e8b0ab;
      border-radius: var(--r); padding: 14px 18px;
      color: var(--danger); font-size: 13px; max-width: 340px;
    }
    /* Browse pagination */
    .browse-nav { display:flex; align-items:center; gap:5px; margin-top:10px; flex-wrap:wrap; }
    .browse-nav button {
      padding: 3px 8px; font-size: 11px; font-family: var(--font-sans);
      border: 1px solid var(--border-2); border-radius: var(--r);
      background: var(--bg); color: var(--text-2); cursor: pointer;
    }
    .browse-nav button:hover, .browse-nav button.active {
      border-color: var(--accent); color: var(--accent);
    }
    .browse-nav .page-info { font-size: 11px; color: var(--text-3); margin-left: auto; }
    /* Image area */
    .img-area { margin-bottom: 12px; }
    .img-loading {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; height: 72px; border: 1px dashed var(--border-2);
      border-radius: var(--r); color: var(--text-3); font-size: 12px;
    }
    .img-actions {
      display: flex; align-items: center; gap: 10px;
      margin-top: 6px; flex-wrap: wrap; font-size: 12px;
    }
    .img-actions a { color: var(--accent); }
    .img-search-prompt {
      display: flex; flex-direction: column; align-items: flex-start;
      gap: 8px; padding: 12px; background: var(--bg-2);
      border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 8px;
    }
  </style>
</head>
<body>

<nav class="nav" aria-label="Site navigation">
  <span class="nav-brand">Zo<em>lai</em></span>
  <span class="nav-meta" id="navMeta">Tedim · English · မြန်မာ</span>
</nav>

<main id="app">
  <!-- Loading screen — replaced by renderPage() on boot -->
  <div class="boot-screen" id="bootScreen">
    <div class="boot-brand">Zo<em>lai</em></div>
    <div class="boot-bar-wrap"><div class="boot-bar" id="bootBar"></div></div>
    <div class="boot-status" id="bootStatus">Starting up…</div>
  </div>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script type="module">
import { DictionaryService } from './app/dictionary.js';
import { debounce, sanitize, parseSense, parseExam, truncate } from './app/utils.js';

// ── POS palette ──────────────────────────────────────────────────────────────
const POS_PAL = {
  0:{bg:'#E1F5EE',text:'#085041',bd:'#9FE1CB'},
  1:{bg:'#E6F1FB',text:'#0C447C',bd:'#B5D4F4'},
  2:{bg:'#FAEEDA',text:'#633806',bd:'#FAC775'},
  3:{bg:'#FAECE7',text:'#4A1B0C',bd:'#F5C4B3'},
  4:{bg:'#F1EFE8',text:'#2C2C2A',bd:'#D3D1C7'},
  5:{bg:'#F1EFE8',text:'#2C2C2A',bd:'#D3D1C7'},
  6:{bg:'#EEEDFE',text:'#26215C',bd:'#CECBF6'},
  7:{bg:'#FCEBEB',text:'#501313',bd:'#F7C1C1'},
 19:{bg:'#EAF3DE',text:'#173404',bd:'#C0DD97'},
};
const pal = id => POS_PAL[id] ?? POS_PAL[0];

// ── State ─────────────────────────────────────────────────────────────────────
const svc       = new DictionaryService();
let selected    = null;
let query       = '';
let browsePage  = 0;
let wikiCache   = {};
const PAGE_SIZE = 80;

// ── DOM ───────────────────────────────────────────────────────────────────────
const $app   = document.getElementById('app');
const $toast = document.getElementById('toast');
let toastTimer;

// ── Progress helpers ──────────────────────────────────────────────────────────
function setProgress(msg, pct) {
  const $bar    = document.getElementById('bootBar');
  const $status = document.getElementById('bootStatus');
  if ($bar)    $bar.style.width    = pct + '%';
  if ($status) $status.textContent = msg;
}

function showBootError(msg) {
  const $screen = document.getElementById('bootScreen');
  if (!$screen) return;
  $screen.innerHTML = `
    <div class="boot-brand">Zo<em>lai</em></div>
    <div class="boot-error">${sanitize(msg)}</div>
    <button class="btn btn-primary" onclick="location.reload()">Retry</button>`;
}

// ── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  try {
    await svc.init((msg, pct) => setProgress(msg, pct));
    document.getElementById('navMeta').textContent =
      `${svc.wordCount.toLocaleString()} words · Tedim · English · မြန်မာ`;
    renderPage();
  } catch (err) {
    showBootError(`Failed to load: ${err.message}`);
  }
}

// ── Page scaffold ─────────────────────────────────────────────────────────────
function renderPage() {
  const prefs = svc.getPrefs();
  $app.innerHTML = `
    <div class="container">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="Search Zolai, English, or Myanmar…"
               value="${sanitize(query)}" autocomplete="off" aria-label="Search" />
        <div class="search-meta">
          <span class="muted" id="searchCount"></span>
          <div class="toggle-row">
            <label class="toggle" aria-label="Toggle images">
              <input type="checkbox" id="imgToggle" ${prefs.showImages ? 'checked' : ''} />
              <span class="toggle-track"></span>
            </label>
            <span class="toggle-label">Images</span>
          </div>
        </div>
      </div>
      <div class="layout">
        <div id="listPane"></div>
        <div id="detailPane"></div>
      </div>
    </div>`;

  document.getElementById('searchInput').addEventListener(
    'input', debounce(e => { query = e.target.value; browsePage = 0; renderList(); }, 200)
  );
  document.getElementById('imgToggle').addEventListener('change', e => {
    svc.setPrefs({ showImages: e.target.checked });
    if (selected) renderDetail(selected);
  });

  renderList();
  renderDetail(null);
}

// ── List pane ─────────────────────────────────────────────────────────────────
function renderList() {
  const $list = document.getElementById('listPane');
  if (!$list) return;

  if (query.trim()) {
    const results = svc.search(query);
    document.getElementById('searchCount').textContent =
      `${results.length} result${results.length !== 1 ? 's' : ''}`;

    if (!results.length) {
      $list.innerHTML = `<p class="no-results">No results for "<strong>${sanitize(query)}</strong>"</p>`;
      return;
    }
    $list.innerHTML = `<div class="word-list">
      ${results.slice(0, 200).map(r => wordCardHTML(r)).join('')}
    </div>`;
  } else {
    const all    = svc.allWords();
    const total  = all.length;
    const pages  = Math.ceil(total / PAGE_SIZE);
    const offset = browsePage * PAGE_SIZE;
    const slice  = all.slice(offset, offset + PAGE_SIZE);

    document.getElementById('searchCount').textContent = `${total.toLocaleString()} words`;

    const alpha = [...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'].map(ch => {
      const idx = all.findIndex(w => w.word.toUpperCase().startsWith(ch));
      if (idx === -1) return '';
      const pg = Math.floor(idx / PAGE_SIZE);
      return `<button onclick="jumpPage(${pg})" ${browsePage===pg?'class="active"':''}>${ch}</button>`;
    }).join('');

    $list.innerHTML = `
      <p class="section-label-sm">Browse — page ${browsePage + 1} of ${pages}</p>
      <div class="browse-grid">${slice.map(w => chipHTML(w)).join('')}</div>
      <div class="browse-nav">
        <button ${browsePage===0?'disabled':''} onclick="jumpPage(${browsePage-1})">‹</button>
        ${alpha}
        <button ${browsePage>=pages-1?'disabled':''} onclick="jumpPage(${browsePage+1})">›</button>
        <span class="page-info">${offset+1}–${Math.min(offset+PAGE_SIZE,total)} of ${total.toLocaleString()}</span>
      </div>`;
  }

  $list.querySelectorAll('[data-word]').forEach(el => {
    el.addEventListener('click', () => selectWord(el.dataset.word));
    if (el.dataset.word === selected) el.classList.add('is-active');
  });
}

window.jumpPage = pg => { browsePage = pg; renderList(); };

function wordCardHTML({ word, senses }) {
  const en  = senses.find(s => s.wseq === 0);
  const my  = senses.find(s => s.wseq === 1);
  const pos = svc.synset(en?.wrte ?? 0);
  const p   = pal(pos.id);
  const { definition } = parseSense(en?.sense ?? '');
  return `<div class="word-card${selected===word.word?' is-active':''}" data-word="${sanitize(word.word)}">
    <div class="wc-zolai">${sanitize(word.word)}</div>
    <div class="wc-en">${sanitize(truncate(definition, 55))}</div>
    ${my ? `<div class="wc-my">${sanitize(truncate(my.sense, 45))}</div>` : ''}
    <div class="wc-foot"><span class="badge" style="background:${p.bg};color:${p.text};border-color:${p.bd}">${sanitize(pos.name)}</span></div>
  </div>`;
}

function chipHTML(word) {
  const senses = svc.sensesFor(word.word);
  const en = senses.find(s => s.wseq === 0);
  const my = senses.find(s => s.wseq === 1);
  const { definition } = parseSense(en?.sense ?? '');
  return `<div class="chip${selected===word.word?' is-active':''}" data-word="${sanitize(word.word)}">
    <span class="chip-z">${sanitize(word.word)}</span>
    <span class="chip-e">${sanitize(truncate(definition, 22))}</span>
    ${my ? `<span class="chip-m">${sanitize(truncate(my.sense, 20))}</span>` : ''}
  </div>`;
}

// ── Detail pane (synchronous render + async image fill) ───────────────────────
function renderDetail(word) {
  const $d = document.getElementById('detailPane');
  if (!$d) return;

  if (!word) {
    $d.innerHTML = `<div class="detail detail-empty">
      <div class="detail-empty-brand">Zo<em>lai</em></div>
      <span class="muted" style="font-size:13px">Select a word to view details</span>
    </div>`;
    return;
  }

  const senses = svc.sensesFor(word);
  const en     = senses.find(s => s.wseq === 0);
  const my     = senses.find(s => s.wseq === 1);
  if (!en) {
    $d.innerHTML = `<div class="detail"><p class="no-results">No entry found for "${sanitize(word)}".</p></div>`;
    return;
  }

  const pos   = svc.synset(en.wrte);
  const p     = pal(pos.id);
  const { definition, notes } = parseSense(en.sense);
  const { zolai: exZ, translation: exT } = parseExam(en.exam);
  const prefs = svc.getPrefs();


  // Build search links
  const keyword = buildImgKeyword(definition);
  const gUrl    = `https://www.google.com/search?udm=2&q=${encodeURIComponent(keyword + ' ' + word + ' Zomi Tedim')}`;

  // Render synchronously — no awaits blocking the UI
  $d.innerHTML = `<div class="detail">

    ${prefs.showImages ? `
    <div class="img-area" id="imgArea">
      <div class="img-loading">
        <span class="spinner"></span>
        <span style="font-size:12px;color:var(--text-3)">${keyword ? `Searching for "${sanitize(keyword)}"…` : 'Finding image…'}</span>
      </div>
    </div>` : ''}

    <div class="detail-zolai">${sanitize(word)}</div>
    <div class="detail-pos">
      <span class="badge" style="background:${p.bg};color:${p.text};border-color:${p.bd}">${sanitize(pos.name)}</span>
      ${pos.shortname ? `<span style="font-size:11px;color:var(--text-3);margin-left:5px">${sanitize(pos.shortname)}</span>` : ''}
    </div>

    <div class="meanings">
      <div class="meaning-row">
        <span class="lang-tag lang-en">EN</span>
        <span class="meaning-en">${sanitize(definition)}</span>
      </div>
      ${my ? `<div class="meaning-row">
        <span class="lang-tag lang-my">MM</span>
        <span class="meaning-my">${sanitize(my.sense)}</span>
      </div>` : ''}
    </div>

    ${notes ? `<div class="section">
      <div class="section-lbl">Notes</div>
      <p class="notes-text">${sanitize(notes)}</p>
    </div>` : ''}

    ${exZ ? `<div class="section">
      <div class="section-lbl">Example</div>
      <p class="example-text">${sanitize(exZ)}</p>
      ${exT ? `<p class="example-trans">${sanitize(exT)}</p>` : ''}
    </div>` : ''}


  </div>`;


  // Load image asynchronously — does NOT block render
  if (prefs.showImages) loadImage(word, keyword, gUrl);  // keyword may be null for verse-definition words
}

// ── Image helpers ─────────────────────────────────────────────────────────────
const IMG_STOP = new Set([
  'and','the','a','an','he','she','it','to','of','in','is','was','that','his',
  'her','their','our','its','be','been','have','had','do','did','does','with',
  'for','on','at','by','from','or','but','not','no','so','let','unto','them',
  'him','up','out','down','shall','will','may','also','said','came','went',
  'come','go','sat','lay','give','gave','take','took','make','made','see','saw',
  'know','say','tell','told','call','primary','general','common','used','refers',
  'describes','expresses','context','term','word','freq','bible','source','book'
]);

// Words that start a Bible verse, not a dictionary definition
const VERSE_STARTERS = new Set([
  'and','the','for','but','in','now','of','he','she','they','his','her',
  'it','then','so','thus','when','if','as','that','a','an','all','there',
  'behold','therefore','both','every','each','thou','thy','thee','ye',
  'unto','after','before','until','because','since','though','from',
  'with','by','at','upon','through','against','among','between','neither','nor'
]);

/**
 * Extract image search keyword from an English definition.
 * Returns null if the definition is a Bible verse fragment (not a real definition).
 * In that case, skip Wikipedia and show Google Images directly.
 */
function buildImgKeyword(definition) {
  const def = definition.split(' — ')[0].trim();
  const firstWord = def.split(' ')[0].toLowerCase().replace(/[^a-z]/g,'');

  // Verse fragment detection: starts with function word OR is a long sentence
  if (VERSE_STARTERS.has(firstWord) || def.split(' ').length > 8) {
    return null;  // signal to skip Wikipedia
  }

  const clean = def.split('/')[0].replace(/[^a-zA-Z\s]/g, ' ').toLowerCase().trim();
  const words = clean.split(/\s+/).filter(w => w.length > 2 && !IMG_STOP.has(w));
  return words.slice(0, 2).join(' ') || null;
}

async function loadImage(word, keyword, gUrl) {
  // No keyword = Bible verse definition; skip Wikipedia, show Google Images directly
  if (!keyword) {
    fillImageArea(word, null, null, gUrl);
    return;
  }
  // Check cache first
  if (wikiCache[keyword] !== undefined) {
    fillImageArea(word, keyword, wikiCache[keyword], gUrl);
    return;
  }
  try {
    const url  = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(keyword)}&prop=pageimages&format=json&pithumbsize=640&origin=*`;
    const res  = await fetch(url);
    const data = await res.json();
    const page = Object.values(data?.query?.pages ?? {})[0];
    wikiCache[keyword] = page?.thumbnail?.source ?? null;
  } catch {
    wikiCache[keyword] = null;
  }
  fillImageArea(word, keyword, wikiCache[keyword], gUrl);
}

function fillImageArea(word, keyword, src, gUrl) {
  // Only update if user is still viewing the same word
  if (selected !== word) return;
  const $area = document.getElementById('imgArea');
  if (!$area) return;

  if (src) {
    $area.innerHTML = `
      <img src="${sanitize(src)}" alt="${sanitize(keyword)}"
           style="width:100%;height:160px;object-fit:cover;border-radius:var(--r);display:block"
           onerror="this.parentElement.innerHTML='<div class=img-search-prompt><span style=font-size:13px;color:var(--text-2)>No image available</span><a class=btn href=${sanitize(gUrl)} target=_blank rel=noopener style=font-size:12px>🔍 Google Images</a></div>'" />
      <div class="img-actions">
        <span style="font-size:11px;color:var(--text-3)">📷 Wikipedia · "${sanitize(keyword)}"</span>
        <a href="${gUrl}" target="_blank" rel="noopener" style="margin-left:auto">More images</a>
      </div>`;
  } else {
    $area.innerHTML = `
      <div class="img-search-prompt">
        <span style="font-size:13px;color:var(--text-2)">Image search: <strong>${sanitize(keyword)}</strong></span>
        <a class="btn btn-secondary" href="${gUrl}" target="_blank" rel="noopener"
           style="font-size:12px;padding:6px 14px">🔍 Search Google Images</a>
      </div>`;
  }
}

// ── Interactions ───────────────────────────────────────────────────────────
function selectWord(word) {
  selected = word;
  // Update active state on cards without re-rendering the whole list
  document.querySelectorAll('[data-word]').forEach(el =>
    el.classList.toggle('is-active', el.dataset.word === word)
  );
  renderDetail(word);
}



function showToast(msg, type = 'success') {
  $toast.textContent   = msg;
  $toast.className     = `toast toast--visible toast--${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { $toast.className = 'toast'; }, 2800);
}

boot();
</script>
</body>
</html>
