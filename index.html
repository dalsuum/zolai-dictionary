<script type="module">
import { DictionaryService } from './app/dictionary.js';
import { FirestoreSync }     from './app/firestore-sync.js';
import { debounce, sanitize, parseSense, parseExam, truncate } from './app/utils.js';

// ── POS palette ──────────────────────────────────────────────────────────────
const POS_PAL = {
   0:{bg:'#E1F5EE',text:'#085041',bd:'#9FE1CB'},
   1:{bg:'#E6F1FB',text:'#0C447C',bd:'#B5D4F4'},
   2:{bg:'#FAEEDA',text:'#633806',bd:'#FAC775'},
   3:{bg:'#FAECE7',text:'#4A1B0C',bd:'#F5C4B3'},
   4:{bg:'#F1EFE8',text:'#2C2C2A',bd:'#D3D1C7'},
   5:{bg:'#F1EFE8',text:'#2C2C2A',bd:'#D3D1C7'},
   6:{bg:'#EEEDFE',text:'#26215C',bd:'#CECBF6'},
   7:{bg:'#FCEBEB',text:'#501313',bd:'#F7C1C1'},
  19:{bg:'#EAF3DE',text:'#173404',bd:'#C0DD97'},
};
const pal = id => POS_PAL[id] ?? POS_PAL[0];

// ── State ─────────────────────────────────────────────────────────────────────
const svc      = new DictionaryService();
const fsync    = new FirestoreSync();
let selected   = null;
let query      = '';
let browsePage = 0;
let wikiCache  = {};
let aiCache    = {};
let aiLoading  = {};
const PAGE_SZ  = 80;

// ── DOM ───────────────────────────────────────────────────────────────────────
const $app   = document.getElementById('app');
const $toast = document.getElementById('toast');
let toastTimer;

// ── Progress ──────────────────────────────────────────────────────────────────
function setProgress(msg, pct) {
  const $b = document.getElementById('bootBar');
  const $s = document.getElementById('bootStatus');
  if ($b) $b.style.width = pct + '%';
  if ($s) $s.textContent = msg;
}
function showBootError(msg) {
  const $s = document.getElementById('bootScreen');
  if ($s) $s.innerHTML = `
    <div class="boot-brand">Zo<em>lai</em></div>
    <div class="boot-error">${sanitize(msg)}</div>
    <button class="btn btn-primary" onclick="location.reload()">Retry</button>`;
}

// ── Analytics helpers ─────────────────────────────────────────────────────────
function gaEvent(name, params = {}) {
  if (typeof gtag !== 'undefined') gtag('event', name, params);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  try {
    await svc.init((msg, pct) => setProgress(msg, pct));

    // Apply Firestore overlay edits — fetch once, then subscribe for live updates
    setProgress('Syncing edits…', 95);
    try {
      const edits = await fsync.fetchAll();
      svc.applyOverlay(edits);
    } catch (err) {
      console.warn('[boot] Firestore overlay failed (non-fatal):', err.message);
    }

    // Pull global config (GA ID, AI key) — applies admin's persistent settings
    try {
      const cfg = await fsync.getConfig();
      if (cfg.gaMeasurementId) localStorage.setItem('ga_measurement_id', cfg.gaMeasurementId);
      if (cfg.aiApiKey)        localStorage.setItem('ai_api_key',        cfg.aiApiKey);
      if (cfg.aiModel)         localStorage.setItem('ai_model',          cfg.aiModel);
    } catch (err) {
      console.warn('[boot] Config load failed (non-fatal):', err.message);
    }

    document.getElementById('navMeta').textContent =
      `${svc.wordCount.toLocaleString()} words · Tedim · English · မြန်မာ`;
    renderPage();

    // Subscribe to live updates — admin edits propagate within ~1 second
    fsync.startListening(edits => {
      svc.applyOverlay(edits);
      // Refresh visible UI without losing scroll position
      if (query.trim()) renderList();
      if (selected)     renderDetail(selected);
    });

  } catch (err) {
    showBootError(`Failed to load: ${err.message}`);
  }
}

// ── Page scaffold ─────────────────────────────────────────────────────────────
function renderPage() {
  const prefs  = svc.getPrefs();
  $app.innerHTML = `
    <div class="container">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="Search Zolai, English, or Myanmar…"
               value="${sanitize(query)}" autocomplete="off" aria-label="Search" />
        <div class="search-meta">
          <span class="muted" id="searchCount"></span>
          <div class="toggle-row">
            <label class="toggle" aria-label="Toggle images">
              <input type="checkbox" id="imgToggle" ${prefs.showImages ? 'checked' : ''} />
              <span class="toggle-track"></span>
            </label>
            <span class="toggle-label">Images</span>
          </div>
        </div>
      </div>
      <div class="layout">
        <div id="listPane"></div>
        <div id="detailPane"></div>
      </div>
    </div>`;

  // Search
  document.getElementById('searchInput').addEventListener(
    'input', debounce(e => {
      query = e.target.value; browsePage = 0; renderList();
      // Track search — fires 300ms after user stops typing
      if (query.trim().length >= 2) {
        gaEvent('search', {
          search_term: query.trim(),
          // Detect which language was searched
          search_language: /[\u1000-\u109F]/.test(query) ? 'myanmar'
                         : /^[a-zA-Z\s]+$/.test(query)   ? 'english_or_zolai'
                         : 'mixed',
        });
      }
    }, 200)
  );
  // Images toggle
  document.getElementById('imgToggle').addEventListener('change', e => {
    svc.setPrefs({ showImages: e.target.checked });
    if (selected) renderDetail(selected);
  });

  renderList();
  renderDetail(null);
}

// ── Highlight ─────────────────────────────────────────────────────────────────
function hl(text, q) {
  const safe = sanitize(text ?? '');
  if (!q || !q.trim()) return safe;
  try {
    const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return safe.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
  } catch { return safe; }
}

// ── List pane ─────────────────────────────────────────────────────────────────
function renderList() {
  const $l = document.getElementById('listPane');
  if (!$l) return;
  const q = query.trim();

  if (q) {
    const res = svc.search(q);
    document.getElementById('searchCount').textContent =
      `${res.length} result${res.length !== 1 ? 's' : ''}`;
    if (!res.length) {
      $l.innerHTML = `<p class="no-results">No results for "<strong>${sanitize(q)}</strong>"</p>`;
      return;
    }
    $l.innerHTML = `<div class="word-list">${res.slice(0,200).map(r => cardHTML(r, q)).join('')}</div>`;
  } else {
    const all   = svc.allWords();
    const total = all.length;
    const pages = Math.ceil(total / PAGE_SZ);
    const off   = browsePage * PAGE_SZ;
    const slice = all.slice(off, off + PAGE_SZ);
    document.getElementById('searchCount').textContent = `${total.toLocaleString()} words`;

    const alpha = [...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'].map(ch => {
      const idx = all.findIndex(w => w.word.toUpperCase().startsWith(ch));
      if (idx === -1) return '';
      const pg = Math.floor(idx / PAGE_SZ);
      return `<button onclick="jumpPage(${pg})" class="${browsePage===pg?'cur':''}">${ch}</button>`;
    }).join('');

    $l.innerHTML = `
      <p class="section-label-sm">Browse — page ${browsePage+1} of ${pages}</p>
      <div class="browse-grid">${slice.map(w => chipHTML(w)).join('')}</div>
      <div class="browse-nav">
        <button ${browsePage===0?'disabled':''} onclick="jumpPage(${browsePage-1})">‹</button>
        ${alpha}
        <button ${browsePage>=pages-1?'disabled':''} onclick="jumpPage(${browsePage+1})">›</button>
        <span class="page-info">${off+1}–${Math.min(off+PAGE_SZ,total)} of ${total.toLocaleString()}</span>
      </div>`;
  }

  $l.querySelectorAll('[data-word]').forEach(el => {
    el.addEventListener('click', () => selectWord(el.dataset.word));
    if (el.dataset.word === selected) el.classList.add('is-active');
  });
}

window.jumpPage = pg => { browsePage = pg; renderList(); };

function cardHTML({ word, senses }, q) {
  const en  = senses.find(s => s.wseq === 0);
  const my  = senses.find(s => s.wseq === 1);
  const pos = svc.synset(en?.wrte ?? 0);
  const p   = pal(pos.id);
  const { definition } = parseSense(en?.sense ?? '');
  return `<div class="word-card${selected===word.word?' is-active':''}" data-word="${sanitize(word.word)}">
    <div class="wc-zolai">${hl(word.word, q)}</div>
    <div class="wc-en">${hl(truncate(definition, 55), q)}</div>
    ${my ? `<div class="wc-my">${hl(truncate(my.sense, 45), q)}</div>` : ''}
    <div class="wc-foot"><span class="badge" style="background:${p.bg};color:${p.text};border-color:${p.bd}">${sanitize(pos.name)}</span></div>
  </div>`;
}

function chipHTML(w) {
  const senses = svc.sensesFor(w.word);
  const en = senses.find(s => s.wseq === 0);
  const my = senses.find(s => s.wseq === 1);
  const { definition } = parseSense(en?.sense ?? '');
  return `<div class="chip${selected===w.word?' is-active':''}" data-word="${sanitize(w.word)}">
    <span class="chip-z">${sanitize(w.word)}</span>
    <span class="chip-e">${sanitize(truncate(definition, 22))}</span>
    ${my ? `<span class="chip-m">${sanitize(truncate(my.sense, 20))}</span>` : ''}
  </div>`;
}

// ── Detail pane ───────────────────────────────────────────────────────────────
function renderDetail(word) {
  const $d = document.getElementById('detailPane');
  if (!$d) return;

  if (!word) {
    $d.innerHTML = `<div class="detail detail-empty">
      <div class="detail-empty-brand">Zo<em>lai</em></div>
      <span class="muted" style="font-size:13px">Select a word to view details</span>
    </div>`;
    return;
  }

  const senses = svc.sensesFor(word);
  const en     = senses.find(s => s.wseq === 0);
  const my     = senses.find(s => s.wseq === 1);
  if (!en) { $d.innerHTML = `<div class="detail"><p class="no-results">No entry found.</p></div>`; return; }

  const pos   = svc.synset(en.wrte);
  const p     = pal(pos.id);
  const { definition, notes } = parseSense(en.sense);
  const { zolai: exZ, translation: exT } = parseExam(en.exam);
  const prefs = svc.getPrefs();
  const hasKey = !!localStorage.getItem('ai_api_key');
  const q = query.trim();  // current search query for highlighting

  // Image keyword — extract from definition, fallback to word
  const keyword = buildImgKeyword(definition);
  // Google Images search using best available term
  const searchTerm = keyword || definition.split(' ').slice(0,3).join(' ') || word;
  const gUrl = `https://www.google.com/search?udm=2&q=${encodeURIComponent(searchTerm + ' ' + word + ' Zomi Tedim Myanmar')}`;

  $d.innerHTML = `<div class="detail">

    ${prefs.showImages ? `
    <div class="img-area" id="imgArea">
      <div class="img-loading">
        <span class="spinner"></span>
        <span style="font-size:12px;color:var(--text-3)">
          ${keyword ? `Searching image for &ldquo;${sanitize(keyword)}&rdquo;&hellip;` : 'Looking for image&hellip;'}
        </span>
      </div>
    </div>` : ''}

    <div class="detail-zolai">${hl(word, q)}</div>
    <div class="detail-pos">
      <span class="badge" style="background:${p.bg};color:${p.text};border-color:${p.bd}">${sanitize(pos.name)}</span>
      ${pos.shortname ? `<span style="font-size:11px;color:var(--text-3);margin-left:5px">${sanitize(pos.shortname)}</span>` : ''}
    </div>

    <div class="meanings">
      <div class="meaning-row">
        <span class="lang-tag lang-en">EN</span>
        <span class="meaning-en">${hl(definition, q)}</span>
      </div>
      ${my ? `<div class="meaning-row">
        <span class="lang-tag lang-my">MM</span>
        <span class="meaning-my">${hl(my.sense, q)}</span>
      </div>` : ''}
    </div>

    ${notes ? `<div class="section">
      <div class="section-lbl">Notes</div>
      <p class="notes-text">${hl(notes, q)}</p>
    </div>` : ''}

    ${exZ ? `<div class="section">
      <div class="section-lbl">Example</div>
      <p class="example-text">${hl(exZ, q)}</p>
      ${exT ? `<p class="example-trans">${hl(exT, q)}</p>` : ''}
    </div>` : ''}

    ${hasKey ? `<div class="ai-section" id="aiSection">
      ${aiCache[word]
        ? `<div class="ai-context">${sanitize(aiCache[word])}</div>`
        : `<button class="ai-btn-sm" id="aiBtn">✦ AI cultural context</button>`}
    </div>` : ''}

  </div>`;

  // Wire AI button
  document.getElementById('aiBtn')?.addEventListener('click', () => getAICtx(word, definition));

  // Load image async (non-blocking)
  if (prefs.showImages) loadImage(word, keyword, gUrl);
}

// ── Image helpers ─────────────────────────────────────────────────────────────
const IMG_STOP = new Set([
  'and','the','for','but','in','now','of','he','she','they','his','her',
  'it','then','so','thus','when','if','as','that','a','an','all','there',
  'behold','therefore','both','every','each','thou','thy','thee','ye',
  'unto','after','before','until','because','since','though','from',
  'with','by','at','upon','through','against','among','between','neither',
  'nor','let','shall','will','may','said','came','went','who','which','was',
  'been','have','had','does','did','not','also','him','them','our','its',
  'their','out','down','up','can','are','nor','but','yet','too','give',
  'gave','take','took','make','made','see','saw','know','say','tell','told',
  'call','begin','began','primary','general','common','used','refers',
  'describes','expresses','context','term','word','freq','bible','source'
]);
const VERSE_START = new Set([
  'and','the','for','but','in','now','of','he','she','they','his','her',
  'it','then','so','thus','when','if','as','that','a','an','all','there',
  'behold','therefore','both','every','each','thou','thy','thee','ye',
  'unto','after','before','until','because','since','though','from',
  'with','by','at','upon','through','against','among','between','neither','nor'
]);

function buildImgKeyword(definition) {
  const def      = definition.split(' — ')[0].trim();
  const firstWd  = def.split(' ')[0].toLowerCase().replace(/[^a-z]/g, '');
  const isVerse  = VERSE_START.has(firstWd) || def.split(' ').length > 8;

  if (!isVerse) {
    // Real definition: "House / home", "To love", "God"
    const clean = def.split('/')[0].replace(/[^a-zA-Z\s]/g, ' ').toLowerCase().trim();
    const words = clean.split(/\s+/).filter(w => w.length > 2 && !IMG_STOP.has(w));
    return words.slice(0, 2).join(' ') || null;
  }

  // Verse fragment: try extracting nouns after articles
  const nouns = [];
  for (const m of def.matchAll(/\b(?:the|a|an|his|her|their|its|of)\s+([a-zA-Z]{4,})/gi)) {
    const w = m[1].toLowerCase();
    if (!IMG_STOP.has(w) && !VERSE_START.has(w)) nouns.push(w);
  }
  return nouns.length ? nouns.slice(0, 2).join(' ') : null;
}

async function loadImage(word, keyword, gUrl) {
  const cacheKey = keyword || '__nkw__';

  // Cap cache size to prevent memory leak over long sessions
  if (Object.keys(wikiCache).length > 200) wikiCache = {};

  if (wikiCache[cacheKey] !== undefined) {
    fillImage(word, keyword, wikiCache[cacheKey], gUrl); return;
  }

  if (keyword) {
    try {
      const url  = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(keyword)}&prop=pageimages&format=json&pithumbsize=640&origin=*`;
      const data = await (await fetch(url)).json();
      const page = Object.values(data?.query?.pages ?? {})[0];
      wikiCache[cacheKey] = page?.thumbnail?.source ?? null;
    } catch { wikiCache[cacheKey] = null; }
  } else {
    wikiCache[cacheKey] = null;
  }

  fillImage(word, keyword, wikiCache[cacheKey], gUrl);
}

function fillImage(word, keyword, src, gUrl) {
  if (selected !== word) return;
  const $a = document.getElementById('imgArea');
  if (!$a) return;

  if (src) {
    $a.innerHTML = `
      <img src="${sanitize(src)}" alt="${sanitize(keyword || word)}"
           style="width:100%;height:160px;object-fit:cover;border-radius:var(--r);display:block"
           onerror="this.parentElement.innerHTML='<div class=img-prompt><span style=font-size:13px>No image available</span><a class=btn href=${sanitize(gUrl)} target=_blank rel=noopener style=font-size:12px>🔍 Google Images</a></div>'" />
      <div class="img-actions">
        <span style="color:var(--text-3)">📷 Wikipedia · ${sanitize(keyword || '')}</span>
        <a href="${sanitize(gUrl)}" target="_blank" rel="noopener" style="margin-left:auto">More images</a>
      </div>`;
  } else {
    $a.innerHTML = `
      <div class="img-prompt">
        <span style="font-size:13px;color:var(--text-2)">
          Image search: <strong>${sanitize(keyword || word)}</strong>
        </span>
        <a class="btn btn-secondary" href="${sanitize(gUrl)}" target="_blank" rel="noopener"
           style="font-size:12px;padding:6px 14px">🔍 Search Google Images</a>
      </div>`;
  }
}

// ── Select word ───────────────────────────────────────────────────────────────
function selectWord(word) {
  selected = word;
  document.querySelectorAll('[data-word]').forEach(el =>
    el.classList.toggle('is-active', el.dataset.word === word)
  );
  renderDetail(word);
  // Track word view
  gaEvent('view_word', {
    word:         word,
    search_query: query.trim() || '(browse)',
  });
}

// ── AI context — powered by OpenRouter ───────────────────────────────────────
// OpenRouter: free $1 credit, 100+ models, OpenAI-compatible API.
// Get free key at https://openrouter.ai/keys
// Recommended free models (set in Admin → Site settings):
//   meta-llama/llama-3.1-8b-instruct:free
//   google/gemini-2.0-flash-exp:free
//   mistralai/mistral-7b-instruct:free
const OPENROUTER_URL = 'https://openrouter.ai/api/v1/chat/completions';
const DEFAULT_MODEL  = 'meta-llama/llama-3.1-8b-instruct:free';

async function callAI(prompt) {
  const key   = localStorage.getItem('ai_api_key');
  const model = localStorage.getItem('ai_model') || DEFAULT_MODEL;
  if (!key) throw new Error('NO_KEY');

  const body = {
    model,
    messages: [{ role: 'user', content: prompt }],
    max_tokens: 600,   // raised from 150 — reasoning models need more headroom
  };

  // For Tencent Hy3 reasoning models, disable reasoning to avoid burning
  // the token budget on internal thinking that we discard anyway
  if (model.includes('hy3') || model.includes('hunyuan')) {
    body.reasoning = { effort: 'disabled' };
  }

  const res = await fetch(OPENROUTER_URL, {
    method:  'POST',
    headers: {
      'Content-Type':  'application/json',
      'Authorization': `Bearer ${key}`,
      'HTTP-Referer':  'https://zolai-dictionary.web.app',
      'X-Title':       'Zolai Dictionary',
    },
    body: JSON.stringify(body),
  });

  const data = await res.json();
  if (data.error) throw new Error(data.error.message ?? 'OpenRouter error');

  // Standard OpenAI-shaped response
  const choice = data?.choices?.[0];
  let text = choice?.message?.content?.trim() ?? '';

  // Reasoning models may put output inside reasoning_details if max_tokens
  // ran out before the final answer was produced. Use that as fallback.
  if (!text) {
    const reasoning = choice?.message?.reasoning_details;
    if (Array.isArray(reasoning) && reasoning.length) {
      text = reasoning.map(r => r.text || r.content || '').join(' ').trim();
    }
  }

  if (!text) {
    const finish = choice?.finish_reason ?? 'unknown';
    throw new Error(`Empty response (finish=${finish}). Try a different model.`);
  }
  return text;
}

async function getAICtx(word, definition) {
  if (aiLoading[word]) return;
  aiLoading[word] = true;

  const $btn = document.getElementById('aiBtn');
  const $sec = document.getElementById('aiSection');
  if ($btn) { $btn.disabled = true; $btn.innerHTML = '<span class="spinner"></span> Loading…'; }

  try {
    const prompt = `In 2 sentences, give cultural or etymological context for the Zolai (Tedim Chin / Zomi) word "${word}" meaning "${definition}". Be concise and factual.`;
    aiCache[word] = await callAI(prompt);
  } catch (err) {
    if (err.message === 'NO_KEY') {
      aiCache[word] = '⚠ Set your OpenRouter API key in Admin → Site settings.';
    } else {
      aiCache[word] = `⚠ ${err.message}`;
    }
  }

  aiLoading[word] = false;
  if ($sec) $sec.innerHTML = `<div class="ai-context">${sanitize(aiCache[word])}</div>`;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  $toast.textContent = msg;
  $toast.className   = `toast toast--visible toast--${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { $toast.className = 'toast'; }, 2800);
}

boot();
</script>
