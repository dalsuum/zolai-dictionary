<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Zolai Dictionary — Admin</title>
  <!-- Google Analytics GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8V1ZP81ZVT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8V1ZP81ZVT', { send_page_view: true });
  </script>
  <style>
    /* Settings panel */
    .admin-settings {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }
    .admin-settings h3 {
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 1rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media(max-width:640px){ .settings-grid { grid-template-columns: 1fr; } }
    .settings-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .settings-field label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
      font-weight: 500;
    }
    .settings-field-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .settings-field input {
      flex: 1;
      padding: 8px 10px;
      font-size: 13px;
      font-family: var(--font-sans);
      border: 1px solid var(--border-2);
      border-radius: var(--r);
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .settings-field input:focus { border-color: var(--accent); }
    .settings-field .field-hint {
      font-size: 11px;
      color: var(--text-3);
    }
    .settings-field .field-hint a { color: var(--accent); }
    .settings-saved {
      font-size: 12px;
      color: var(--success);
      display: none;
    }
    .settings-saved.show { display: inline; }
    .settings-divider {
      grid-column: 1/-1;
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/admin.css" />
  <style>
    /* ── Google Sign-In screen ── */
    .signin-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      gap: 1.25rem;
      text-align: center;
    }
    .signin-logo {
      font-family: var(--font-serif);
      font-size: 36px;
      color: var(--accent);
    }
    .signin-screen h2 {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
    }
    .signin-screen p {
      font-size: 14px;
      color: var(--text-2);
      max-width: 320px;
      line-height: 1.6;
    }
    /* Google button — matches Google's brand guidelines */
    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 11px 24px;
      background: var(--bg);
      border: 1px solid var(--border-2);
      border-radius: var(--r);
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .btn-google:hover {
      background: var(--bg-2);
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .btn-google svg { flex-shrink: 0; }
    .signin-error {
      font-size: 13px;
      color: var(--danger);
      background: var(--danger-bg);
      border: 1px solid #e8b0ab;
      border-radius: var(--r);
      padding: 8px 16px;
      max-width: 320px;
    }
    /* ── User chip in nav ── */
    .nav-user {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .nav-user img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--border-2);
    }
    .nav-user-name {
      font-size: 13px;
      color: var(--text-2);
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Loading state */
    .auth-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 10px;
      color: var(--text-3);
      font-size: 14px;
    }
  </style>
</head>
<body>

<nav class="nav" aria-label="Admin navigation" id="mainNav">
  <span class="nav-brand">Zo<em>lai</em></span>
  <span class="admin-badge">Admin</span>
  <a class="nav-back" href="index.html" style="margin-left:auto">← Dictionary</a>
</nav>

<main class="container" id="app">
  <div class="auth-loading">
    <span class="spinner"></span> Checking authentication…
  </div>
</main>

<!-- Edit / Add modal -->
<div class="overlay" id="editOverlay" hidden role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h3 id="modalTitle">Add word</h3>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label" for="f-word">Zolai word *</label>
        <input class="input" id="f-word" placeholder="e.g. Hoih" autocomplete="off" />
      </div>
      <div class="form-group">
        <label class="form-label" for="f-pos">Part of speech *</label>
        <select class="input select" id="f-pos"></select>
      </div>
      <div class="form-group">
        <label class="form-label" for="f-sense-en">English meaning *</label>
        <input class="input" id="f-sense-en" placeholder="e.g. Good / beautiful" />
      </div>
      <div class="form-group">
        <label class="form-label" for="f-sense-my">Myanmar (Burmese)</label>
        <input class="input" id="f-sense-my" placeholder="e.g. ကောင်းသော / လှသော" />
      </div>
      <div class="form-group form-full">
        <label class="form-label" for="f-exam">Example sentence</label>
        <input class="input" id="f-exam" placeholder="Zolai sentence (English translation)" />
      </div>
      <div class="form-group form-full">
        <label class="form-label" for="f-notes">Notes</label>
        <textarea class="input textarea" id="f-notes" placeholder="Optional linguistic or cultural notes"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" id="modalCancelBtn">Cancel</button>
      <button class="btn btn-primary"   id="modalSaveBtn">Add word</button>
    </div>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="overlay" id="deleteOverlay" hidden role="dialog" aria-modal="true">
  <div class="modal" style="max-width:460px">
    <h3>Delete word</h3>
    <div class="delete-msg" id="deleteMsg"></div>
    <div class="form-actions">
      <button class="btn btn-secondary" id="deleteCancelBtn">Cancel</button>
      <button class="btn btn-danger"    id="deleteConfirmBtn">Delete permanently</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script type="module">
import { AuthService }       from './app/auth.js';
import { DictionaryService } from './app/dictionary.js';
import { sanitize, parseSense } from './app/utils.js';

// ── POS palette ──────────────────────────────────────────────────────────────
const POS_PAL = {
  0:{bg:'#E1F5EE',text:'#085041',bd:'#9FE1CB'},
  1:{bg:'#E6F1FB',text:'#0C447C',bd:'#B5D4F4'},
  2:{bg:'#FAEEDA',text:'#633806',bd:'#FAC775'},
  3:{bg:'#FAECE7',text:'#4A1B0C',bd:'#F5C4B3'},
  4:{bg:'#F1EFE8',text:'#2C2C2A',bd:'#D3D1C7'},
  5:{bg:'#F1EFE8',text:'#2C2C2A',bd:'#D3D1C7'},
  6:{bg:'#EEEDFE',text:'#26215C',bd:'#CECBF6'},
  7:{bg:'#FCEBEB',text:'#501313',bd:'#F7C1C1'},
  19:{bg:'#EAF3DE',text:'#173404',bd:'#C0DD97'},
};
const pal = id => POS_PAL[id] ?? POS_PAL[0];

// ── Services ─────────────────────────────────────────────────────────────────
const auth = new AuthService();
const svc  = new DictionaryService();

// ── State ─────────────────────────────────────────────────────────────────────
let filterVal  = '';
let editTarget = null;
let toastTimer;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const $app          = document.getElementById('app');
const $nav          = document.getElementById('mainNav');
const $editOverlay  = document.getElementById('editOverlay');
const $deleteOverlay= document.getElementById('deleteOverlay');
const $toast        = document.getElementById('toast');

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  await svc.init();
  populatePosSelect();

  // Listen to auth state — renders correct screen whenever it changes
  auth.onAuthChange(user => {
    updateNav(user);
    if (user) {
      renderTable();
    } else {
      renderSignIn();
    }
  });

  // Modal close bindings
  document.getElementById('modalCancelBtn') .addEventListener('click', closeEditModal);
  document.getElementById('deleteCancelBtn').addEventListener('click', closeDeleteModal);
  document.getElementById('modalSaveBtn')   .addEventListener('click', handleSave);

  [$editOverlay, $deleteOverlay].forEach(o =>
    o.addEventListener('click', e => { if (e.target === o) o.hidden = true; })
  );
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { $editOverlay.hidden = true; $deleteOverlay.hidden = true; }
  });
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function updateNav(user) {
  // Remove previous user chip if any
  $nav.querySelector('.nav-user')?.remove();
  $nav.querySelector('.nav-back')?.remove();

  const backLink = document.createElement('a');
  backLink.className = 'nav-back';
  backLink.href = 'index.html';
  backLink.textContent = '← Dictionary';

  if (user) {
    const chip = document.createElement('div');
    chip.className = 'nav-user';
    chip.innerHTML = `
      ${user.photoURL ? `<img src="${sanitize(user.photoURL)}" alt="${sanitize(user.displayName)}" referrerpolicy="no-referrer" />` : ''}
      <span class="nav-user-name">${sanitize(user.displayName || user.email)}</span>
      <button class="btn btn-secondary" style="padding:4px 10px;font-size:12px" id="signOutBtn">Sign out</button>`;
    $nav.appendChild(backLink);
    $nav.appendChild(chip);
    $nav.querySelector('#signOutBtn').addEventListener('click', () => auth.signOut());
  } else {
    $nav.appendChild(backLink);
  }
}

// ── Sign-in screen ────────────────────────────────────────────────────────────
function renderSignIn(errorMsg = '') {
  $app.innerHTML = `
    <div class="signin-screen">
      <div class="signin-logo">◆</div>
      <h2>Admin access</h2>
      <p>Sign in with your authorized Google account to manage the dictionary.</p>
      <button class="btn-google" id="googleSignInBtn">
        <!-- Google "G" logo SVG -->
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      </button>
      ${errorMsg ? `<div class="signin-error">${sanitize(errorMsg)}</div>` : ''}
    </div>`;

  document.getElementById('googleSignInBtn').addEventListener('click', handleSignIn);
}

async function handleSignIn() {
  const btn = document.getElementById('googleSignInBtn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Signing in…`;
  }
  try {
    await auth.signIn();
    // onAuthChange fires automatically → renderTable() called there
  } catch (err) {
    renderSignIn(err.message);
  }
}

// ── Admin table ───────────────────────────────────────────────────────────────
function renderTable() {
  const all      = svc.allWords();
  const f        = filterVal.toLowerCase().trim();
  const filtered = f
    ? all.filter(w => {
        const senses = svc.sensesFor(w.word);
        return w.word.toLowerCase().includes(f)
          || senses.some(s => s.sense.toLowerCase().includes(f));
      })
    : all;

  // Load saved settings
  const savedGA  = localStorage.getItem('ga_measurement_id') || 'G-8V1ZP81ZVT';
  const savedKey = localStorage.getItem('gemini_api_key')    || '';

  $app.innerHTML = `

    <!-- ── Settings panel ─────────────────────────────────────────────── -->
    <div class="admin-settings">
      <h3>⚙️ Site settings</h3>
      <div class="settings-grid">

        <!-- Google Analytics -->
        <div class="settings-field">
          <label>Google Analytics Measurement ID</label>
          <div class="settings-field-row">
            <input id="gaIdInput" type="text"
                   placeholder="G-XXXXXXXXXX"
                   value="${sanitize(savedGA)}" />
            <button class="btn btn-secondary" style="font-size:12px;padding:6px 10px;white-space:nowrap"
                    onclick="saveGaId()">Save</button>
          </div>
          <span class="field-hint">
            Get ID from <a href="https://analytics.google.com" target="_blank" rel="noopener">analytics.google.com</a>
            → Admin → Data streams.
            <span class="settings-saved" id="gaSaved">✓ Saved — reload page to apply</span>
          </span>
        </div>

        <!-- Gemini AI -->
        <div class="settings-field">
          <label>Gemini AI API Key (free)</label>
          <div class="settings-field-row">
            <input id="geminiKeyInput" type="password"
                   placeholder="AIzaSy…"
                   value="${sanitize(savedKey)}" autocomplete="off" />
            <button class="btn btn-secondary" style="font-size:12px;padding:6px 10px;white-space:nowrap"
                    onclick="saveGeminiKey()">Save</button>
          </div>
          <span class="field-hint">
            Free key at <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">aistudio.google.com</a>
            — no credit card needed. Stored in browser only.
            <span class="settings-saved" id="geminiSaved">✓ Saved</span>
          </span>
        </div>

      </div>
    </div>

    <!-- ── Dictionary table ───────────────────────────────────────────── -->
    <div class="toolbar">
      <h1>Dictionary management
        <span class="muted" style="font-size:14px;font-weight:400">${all.length.toLocaleString()} words</span>
      </h1>
      <div class="toolbar-right">
        <input class="input filter-input" type="search" id="filterInput"
               placeholder="Filter words…" value="${sanitize(filterVal)}"
               aria-label="Filter word list" />
        <button class="btn btn-primary" id="addBtn">+ Add word</button>
      </div>
    </div>

    <div class="table-wrap" role="region" aria-label="Word list">
      <table class="data-table">
        <thead><tr>
          <th class="col-word">Zolai</th>
          <th class="col-en">English</th>
          <th class="col-my">Myanmar</th>
          <th class="col-pos">POS</th>
          <th class="col-actions">Actions</th>
        </tr></thead>
        <tbody>
          ${filtered.length === 0
            ? `<tr><td colspan="5" class="no-results">No words match your filter.</td></tr>`
            : filtered.map(w => rowHTML(w)).join('')}
        </tbody>
      </table>
    </div>`;

  document.getElementById('filterInput').addEventListener('input', e => {
    filterVal = e.target.value; renderTable();
  });
  document.getElementById('addBtn').addEventListener('click', openAddModal);

  $app.querySelectorAll('[data-edit]').forEach(btn =>
    btn.addEventListener('click', () => openEditModal(btn.dataset.edit))
  );
  $app.querySelectorAll('[data-delete]').forEach(btn =>
    btn.addEventListener('click', () => openDeleteModal(btn.dataset.delete))
  );
}

function rowHTML(word) {
  const senses = svc.sensesFor(word.word);
  const en  = senses.find(s => s.wseq === 0);
  const my  = senses.find(s => s.wseq === 1);
  const pos = svc.synset(en?.wrte ?? 0);
  const p   = pal(pos.id);
  const { definition } = parseSense(en?.sense ?? '');
  return `<tr>
    <td class="col-word">${sanitize(word.word)}</td>
    <td class="col-en">${sanitize(definition)}</td>
    <td class="col-my">${sanitize(my?.sense?.slice(0,40) ?? '—')}</td>
    <td class="col-pos"><span class="badge" style="background:${p.bg};color:${p.text};border-color:${p.bd}">${sanitize(pos.name)}</span></td>
    <td class="col-actions"><div class="row-actions">
      <button class="btn btn-secondary btn-sm" data-edit="${sanitize(word.word)}">Edit</button>
      <button class="btn btn-danger    btn-sm" data-delete="${sanitize(word.word)}">Del</button>
    </div></td>
  </tr>`;
}

// ── POS dropdown ──────────────────────────────────────────────────────────────
function populatePosSelect() {
  const $sel = document.getElementById('f-pos');
  svc.allSynsets().forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id; opt.textContent = s.name;
    $sel.appendChild(opt);
  });
}

// ── Edit modal ────────────────────────────────────────────────────────────────
function openAddModal() {
  editTarget = null;
  document.getElementById('modalTitle').textContent = 'Add word';
  document.getElementById('modalSaveBtn').textContent = 'Add word';
  ['f-word','f-sense-en','f-sense-my','f-exam','f-notes'].forEach(id =>
    document.getElementById(id).value = '');
  document.getElementById('f-pos').selectedIndex = 0;
  $editOverlay.hidden = false;
  document.getElementById('f-word').focus();
}

function openEditModal(word) {
  editTarget = word;
  const senses = svc.sensesFor(word);
  const en = senses.find(s => s.wseq === 0);
  const my = senses.find(s => s.wseq === 1);
  const { definition, notes } = parseSense(en?.sense ?? '');
  document.getElementById('modalTitle').textContent  = `Edit — ${word}`;
  document.getElementById('modalSaveBtn').textContent = 'Save changes';
  document.getElementById('f-word').value     = word;
  document.getElementById('f-pos').value      = en?.wrte ?? 0;
  document.getElementById('f-sense-en').value = definition;
  document.getElementById('f-sense-my').value = my?.sense ?? '';
  document.getElementById('f-exam').value     = en?.exam ?? '';
  document.getElementById('f-notes').value    = notes;
  $editOverlay.hidden = false;
  document.getElementById('f-word').focus();
}

function closeEditModal() { $editOverlay.hidden = true; }

function handleSave() {
  const word    = document.getElementById('f-word').value.trim();
  const senseEn = document.getElementById('f-sense-en').value.trim();
  const senseMy = document.getElementById('f-sense-my').value.trim();
  const wrte    = parseInt(document.getElementById('f-pos').value, 10);
  const exam    = document.getElementById('f-exam').value.trim();
  const notes   = document.getElementById('f-notes').value.trim();
  if (!word || !senseEn) { showToast('Zolai word and English meaning are required.', 'error'); return; }
  const senseEnFull = notes ? `${senseEn} — ${notes}` : senseEn;
  try {
    if (editTarget) {
      svc.updateWord(editTarget, { word, wrte, senseEn: senseEnFull, senseMy, exam });
      showToast('Word updated');
    } else {
      svc.addWord({ word, wrte, senseEn: senseEnFull, senseMy, exam });
      showToast('Word added');
    }
    closeEditModal();
    renderTable();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ── Delete modal ──────────────────────────────────────────────────────────────
function openDeleteModal(word) {
  document.getElementById('deleteMsg').innerHTML =
    `Delete <strong>"${sanitize(word)}"</strong>? This cannot be undone.`;
  document.getElementById('deleteConfirmBtn').onclick = () => {
    svc.deleteWord(word);
    $deleteOverlay.hidden = true;
    showToast('Word deleted');
    renderTable();
  };
  $deleteOverlay.hidden = false;
}
function closeDeleteModal() { $deleteOverlay.hidden = true; }

// ── Settings save functions (exposed to window for inline onclick) ────────────
window.saveGaId = function() {
  const val = document.getElementById('gaIdInput')?.value.trim();
  if (!val || !val.startsWith('G-')) {
    showToast('Invalid ID — must start with G-', 'error'); return;
  }
  localStorage.setItem('ga_measurement_id', val);

  // Re-initialise GA with new ID (no reload needed for tracking)
  if (typeof gtag !== 'undefined') {
    gtag('config', val, { send_page_view: false });
  }

  const $saved = document.getElementById('gaSaved');
  if ($saved) { $saved.classList.add('show'); setTimeout(() => $saved.classList.remove('show'), 3000); }
  showToast('GA Measurement ID saved ✓');
};

window.saveGeminiKey = function() {
  const val = document.getElementById('geminiKeyInput')?.value.trim();
  if (val) {
    localStorage.setItem('gemini_api_key', val);
    const $saved = document.getElementById('geminiSaved');
    if ($saved) { $saved.classList.add('show'); setTimeout(() => $saved.classList.remove('show'), 3000); }
    showToast('Gemini key saved ✓');
  } else {
    localStorage.removeItem('gemini_api_key');
    showToast('Gemini key cleared');
  }
};

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  $toast.textContent = msg;
  $toast.className = `toast toast--visible toast--${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { $toast.className = 'toast'; }, 2800);
}

boot();
</script>
</body>
</html>
